exclude: |
  (?x)^(
    \.omc/|
    \.lean-ctx/|
    \.gemini/|
    \.claude/|
    \.serverless/|
    docs/|
    node_modules/|
    deps/|
    \.venv/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        name: "ruff lint"
        args: [--fix]
      - id: ruff
        name: "ruff sort imports"
        args: ["--select", "I", "--fix"]
      - id: ruff-format
        name: "ruff format"
