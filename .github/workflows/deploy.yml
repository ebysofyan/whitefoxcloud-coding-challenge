name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to AWS (dev)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: make lint

      - name: Test
        run: make test

      - name: Coverage (90% gate)
        run: make coverage

      - name: Build Lambda deps
        run: make deps

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Serverless Framework
        run: npm install -g serverless

      - name: Deploy
        id: deploy
        run: |
          serverless deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
          ENVIRONMENT: dev

      - name: Verify API health
        run: |
          # Extract API Gateway URL from serverless state
          API_URL=$(python3 -c "
          import json, glob, os
          for f in glob.glob('.serverless/cloudformation-template-update-stack-*.json'):
              with open(f) as fh:
                  tmpl = json.load(fh)
                  outputs = tmpl.get('Outputs', [])
                  for o in outputs:
                      if o['OutputKey'] == 'ServiceEndpoint':
                          print(o['OutputValue'].rstrip('/'))
                          exit()
          print('ERROR: ServiceEndpoint not found', file=os.sys.stderr)
          os.sys.exit(1)
          ")
          echo "API_URL=$API_URL"

          # Debug: check secrets are set
          if [ -z "${{ secrets.API_TEST_USERNAME }}" ]; then
            echo "::error::API_TEST_USERNAME secret is empty or not set"
            exit 1
          fi
          if [ -z "${{ secrets.API_TEST_PASSWORD }}" ]; then
            echo "::error::API_TEST_PASSWORD secret is empty or not set"
            exit 1
          fi

          # Login
          LOGIN_HTTP_CODE=$(curl -s -o /tmp/login.json -w "%{http_code}" -X POST "${API_URL}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${{ secrets.API_TEST_USERNAME }}\", \"password\": \"${{ secrets.API_TEST_PASSWORD }}\"}")
          echo "Login HTTP: $LOGIN_HTTP_CODE"

          if [ "$LOGIN_HTTP_CODE" != "200" ]; then
            echo "::error::Login failed with HTTP $LOGIN_HTTP_CODE"
            cat /tmp/login.json
            exit 1
          fi

          TOKEN=$(python3 -c "import json; print(json.load(open('/tmp/login.json'))['access_token'])")

          # Verify authenticated endpoint
          BOOKS_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/books" \
            -H "Authorization: Bearer $TOKEN")
          echo "Books HTTP: $BOOKS_HTTP_CODE"

          if [ "$BOOKS_HTTP_CODE" != "200" ]; then
            echo "::error::Books endpoint returned HTTP $BOOKS_HTTP_CODE"
            exit 1
          fi

          echo "API health check passed (login: 200, books: 200)"
