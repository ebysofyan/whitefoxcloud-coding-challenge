name: PR Guard

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: make lint

      - name: Test
        run: make test

      - name: Coverage (90% gate)
        run: make coverage
