service: books-api

frameworkVersion: "4"

package:
  patterns:
    - "!.venv/**"
    - "!node_modules/**"
    - "!.serverless/**"
    - "!.pytest_cache/**"
    - "!.ruff_cache/**"
    - "!tests/**"
    - "!docs/**"
    - "!.git/**"
    - "!.coverage"
    - "!.env"
    - "!.omc/**"
    - "!.claude/**"
    - "!.lean-ctx/**"
    - "!docker-compose.yml"
    - "!Makefile"
    - "!pyproject.toml"
    - "!uv.lock"
    - "!README.md"
    - "!**/__pycache__/**"
    - "!.pre-commit-config.yaml"
    - "!.lambda_deps/**"
    - "!scripts/**"
    - "!package*.json"
    - "!requirements.txt"
    - "src/**"
    - "static/**"
    - "deps/**"

provider:
  name: aws
  runtime: python3.14
  region: ${opt:region, 'ap-southeast-1'}
  stage: ${opt:stage, 'dev'}
  environment:
    ENVIRONMENT: ${self:provider.stage}
    PYTHONPATH: /var/task/deps

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:DeleteItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:DescribeTable
          Resource:
            - Fn::GetAtt: [BooksTable, Arn]

functions:
  api:
    handler: src.main.handler
    events:
      - http:
          path: /{proxy+}
          method: ANY
          cors: true
      - http:
          path: /
          method: GET
          cors: true

resources:
  Resources:
    BooksTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.tableName}
        BillingMode: PAY_PER_REQUEST
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S

custom:
  tableName: ${opt:stage, 'dev'}-books
